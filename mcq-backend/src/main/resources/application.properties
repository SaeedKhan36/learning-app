# ===============================
# Server Configuration
# ===============================
server.port=8080
server.servlet.context-path=/api/v1

# ===============================
# Database Configuration (Mock PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/mcq_db
spring.datasource.username=pguser
spring.datasource.password=pgpass
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# Hibernate & JPA Config
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# Custom App Properties (Mocked Flags)
# ===============================
app.feature-flags.caching-enabled=true
app.feature-flags.microservices-sync=false
app.security.jwt.secret=mockSecretKeyThatShouldBeStoredSecurelyInProd
app.security.jwt.expiration-time=3600000
